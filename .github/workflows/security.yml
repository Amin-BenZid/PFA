name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # STEP 1 — Secret Scanning
  secret-scan:
    name: Secret Scan (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # STEP 2 — Dependency Audit

  dependency-audit:
    name: Dependency Audit (npm audit)
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit Backend
        working-directory: backend
        run: |
          npm install
          npm audit --audit-level=high --json > ../audit-backend.json || true

      - name: Audit Frontend
        working-directory: frontend
        run: |
          npm install
          npm audit --audit-level=high --json > ../audit-frontend.json || true

      - name: Check for high vulnerabilities
        run: |
          BACKEND=$(cat audit-backend.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0) + d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))")
          FRONTEND=$(cat audit-frontend.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('metadata',{}).get('vulnerabilities',{}).get('high',0) + d.get('metadata',{}).get('vulnerabilities',{}).get('critical',0))")
          echo "Backend high/critical: $BACKEND"
          echo "Frontend high/critical: $FRONTEND"
          if [ "$BACKEND" -gt "0" ] || [ "$FRONTEND" -gt "0" ]; then
            echo "High or critical vulnerabilities found. Blocking pipeline."
            exit 1
          fi
          echo "No high or critical vulnerabilities found."

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-reports
          path: |
            audit-backend.json
            audit-frontend.json

  # STEP 3 — SAST (CodeQL)
  codeql:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

      - name: Block on high severity findings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ALERTS=$(gh api /repos/${{ github.repository }}/code-scanning/alerts \
            --jq '[.[] | select(.state=="open" and (.rule.severity=="high" or .rule.severity=="critical"))] | length')
          echo "Open high/critical alerts: $ALERTS"
          if [ "$ALERTS" -gt "0" ]; then
            echo "$ALERTS high/critical CodeQL findings. Blocking pipeline."
            exit 1
          fi
          echo "No high or critical CodeQL findings."