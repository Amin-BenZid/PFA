name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: eu-west-1
  ECR_BACKEND: apple-disease-backend
  ECR_AI: apple-disease-ai

jobs:
  deploy:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_BACKEND:${{ github.sha }} ./backend
          docker push $REGISTRY/$ECR_BACKEND:${{ github.sha }}
          docker tag $REGISTRY/$ECR_BACKEND:${{ github.sha }} $REGISTRY/$ECR_BACKEND:latest
          docker push $REGISTRY/$ECR_BACKEND:latest

      - name: Build & push AI image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_AI:${{ github.sha }} ./ai-model
          docker push $REGISTRY/$ECR_AI:${{ github.sha }}
          docker tag $REGISTRY/$ECR_AI:${{ github.sha }} $REGISTRY/$ECR_AI:latest
          docker push $REGISTRY/$ECR_AI:latest

      # TODO Phase 5: trigger App Runner / ECS service update
