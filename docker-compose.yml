services:
  ai-model:
    build: ./ai-model
    container_name: pfa-ai
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ai-model/models:/app/models:ro

  backend:
    build: ./backend
    container_name: pfa-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - AI_SERVICE_URL=http://ai-model:8000
      - USE_MOCK_AI=true
      - MONGODB_URI=${MONGODB_URI}
    depends_on:
      - ai-model

  frontend:
    build: ./frontend
    container_name: pfa-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api
    depends_on:
      - backend
